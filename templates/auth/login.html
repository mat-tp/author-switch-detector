{% extends "base.html" %}
{% block title %}Log In · Author Switch Detector{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-icon">◈</span>
            Author Switch Detector
        </div>
        <h2 class="auth-title">Log in</h2>

        <form method="POST" action="{{ url_for('auth_login', next=request.args.get('next','')) }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       autocomplete="username" autofocus
                       value="{{ request.form.get('username', '') }}" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Log in</button>
        </form>

        <p class="auth-alt">
            No account yet?
            <a href="{{ url_for('auth_register') }}">Register</a>
        </p>
    </div>
</div>
{% endblock %}
