{% extends "base.html" %}
{% block title %}Register · Author Switch Detector{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand">
            <span class="brand-icon">◈</span>
            Author Switch Detector
        </div>
        <h2 class="auth-title">Create an account</h2>

        <form method="POST" action="{{ url_for('auth_register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       autocomplete="username" autofocus
                       value="{{ request.form.get('username', '') }}"
                       minlength="3" maxlength="32" required>
                <span class="hint">3–32 characters, letters/digits/hyphens/underscores.</span>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       autocomplete="new-password" minlength="6" required>
                <span class="hint">At least 6 characters.</span>
            </div>
            <div class="form-group">
                <label for="password2">Confirm password</label>
                <input type="password" id="password2" name="password2"
                       autocomplete="new-password" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create account</button>
        </form>

        <p class="auth-alt">
            Already have an account?
            <a href="{{ url_for('auth_login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
